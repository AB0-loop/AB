arin collar - heritage form, contemporary fit.",p11:"The trial fitting, where drape and proportion are refined by hand before finishing.",p12:"An after-hours suit in midnight tones, lean through the chest and leg.",p13:"A brown three-piece in warm tonal cloth - half-canvas build, softly structured.",p14:"An onyx evening suit, close-cut with a satin sheen for after-dark occasions.",p15:"A charcoal executive two-piece, pressed sharp for the demands of the day.",p16:"A peak lapel with real presence, built around a hand-rolled canvas.",p17:"Structured, polished suiting for women who want a formal silhouette that still feels powerful and calm.",p18:"A pinstripe cut lean, the boardroom classic reimagined for modern shoulders.",p19:"A refined plaid in muted tones - texture without noise.",p20:"A timeless drape in classic cloth, tailored for the long wear.",p21:"A groom's ceremony suit, cut for comfort across a full day of celebration.",p22:"Heritage ethnic attire with hand-detailing, fitted to a contemporary silhouette."},d0=["Koramangala","Sarjapur Road","Indiranagar","Whitefield","HSR Layout","Jayanagar","MG Road & UB City","Electronic City","Hebbal","Malleshwaram","Sadashivanagar","Yelahanka","JP Nagar","Bellandur","Marathahalli"],m0=[{quote:"Aurum Bespoke handled the consultation cleanly and understood the fit requirement without pushing ready-made options.",name:"W3Bhub",area:"Bangalore"},{quote:"The process was direct, measured and professional. The team kept the garment focused on fit, fabric and finish.",name:"AFX Cash Pilot",area:"Bangalore"},{quote:"The online consultation and follow-up were practical, especially for remote coordination and delivery planning.",name:"Ghani",area:"UAE"}],h0=[{q:"How do I book a consultation?",a:"Tap any Book Consultation or WhatsApp button, or send your details through the booking form. Our atelier confirms your appointment - usually over WhatsApp - and arranges a visit to your home or office."},{q:"Where do you offer consultations?",a:"We visit you across Bangalore at your home or office. We also serve select remote clients across Karnataka and UAE - just ask and we'll let you know what's possible."},{q:"How long does a bespoke garment take?",a:"The standard workflow targets a first trial within seven days and final delivery in the following seven days after trial approval, subject to garment type, fabric availability and customization."},{q:"What is the difference between British fit and Italian fit?",a:"British fit is more structured and formal, with sharper shoulders and a more defined waist. Italian fit is softer and more fluid, with a cleaner drape and a contemporary line."},{q:"Do you make formal suits for women too?",a:"Yes. We create tailored formal suiting for women - from sharp boardroom separates to polished evening pieces, designed for both presence and wearability."},{q:"Do you make wedding outfits for the full party?",a:"Yes. We coordinate tailoring for the groom, family and wedding party, and we're open to collaborating with event planners and stylists to keep everything consistent."},{q:"How is pricing decided?",a:"Each garment is quoted individually based on your chosen fabric, construction and detailing. We share clear options at your consultation - no obligation."},{q:"Do you make children's formal suits?",a:"Yes. We craft bespoke formal wear for children with the same attention to detail and fit as adult garments."},{q:"Can you source a specific fabric I want?",a:"We can check special fabric sourcing options through textile partners, subject to availability, budget and delivery timelines."},{q:"What fit options do you offer?",a:"We discuss English, British, Italian, American, classic, modern, slim, relaxed, soft-structure and fully custom fit directions, then draft around your measurements and posture."},{q:"How do UAE online orders work?",a:"UAE clients are handled through online consultation sessions, remote measurement guidance, fabric and design confirmation, then pro
