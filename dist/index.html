          { "@type": "Question", "name": "How do I book a consultation with Aurum Bespoke?", "acceptedAnswer": { "@type": "Answer", "text": "Tap a Book Consultation or WhatsApp button, or send your details through the booking form. The atelier confirms your appointment, usually over WhatsApp, and arranges a visit to your home or office." } },
          { "@type": "Question", "name": "Where does Aurum Bespoke offer consultations?", "acceptedAnswer": { "@type": "Answer", "text": "Aurum Bespoke offers private home and office consultations across Bangalore, subject to scheduling, and serves select remote clients across Karnataka and the UAE." } },
          { "@type": "Question", "name": "What is the difference between British fit and Italian fit?", "acceptedAnswer": { "@type": "Answer", "text": "British fit is more structured and formal, with sharper shoulders and a more defined waist. Italian fit is softer and more fluid, with a cleaner drape and a contemporary line." } },
          { "@type": "Question", "name": "Do you make formal suits for women too?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Aurum Bespoke creates tailored formal suiting for women, from boardroom separates to evening pieces, designed around measurements, posture and occasion." } },
          { "@type": "Question", "name": "Do you make children's formal suits?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. Aurum Bespoke crafts bespoke formal wear for children with attention to comfort, proportion and fit." } },
          { "@type": "Question", "name": "Can you source a specific fabric I want?", "acceptedAnswer": { "@type": "Answer", "text": "Aurum Bespoke can check special fabric sourcing requests through textile partners, subject to availability, budget and delivery timelines." } },
          { "@type": "Question", "name": "What fit options do you offer?", "acceptedAnswer": { "@type": "Answer", "text": "Fit directions include English, British, Italian, American, classic, modern, slim, relaxed, soft-structure and fully custom fits, drafted around client measurements and posture." } },
          { "@type": "Question", "name": "Does Aurum Bespoke sell ready-made collections?", "acceptedAnswer": { "@type": "Answer", "text": "No. Aurum Bespoke is made-to-order and focuses on new bespoke commissions rather than ready inventory." } }
